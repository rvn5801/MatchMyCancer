name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get install -y tesseract-ocr
      - run: pip install -r backend/requirements.txt
      # No OPENAI_API_KEY: LLM tests are integration tests that self-skip
      # without a key, so CI stays free and deterministic. Run them locally
      # with a key set. Mocked unit tests run here regardless.
      - run: cd backend && python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
